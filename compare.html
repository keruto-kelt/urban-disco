<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>目黒区価格比較</title>
    <link rel="stylesheet" href="style.css">
    <script src="comp.js"></script>
    <style>
        table {
    border-collapse: collapse;
    font-family: sans-serif;
    table-layout: fixed;
    width: 420px;
}

th, td {
    border: 1px solid #000;
    height: 35px;
    padding: 4px;
}

.col-name {
    width: 180px;
}

.col-price {
    width: 140px;
}

.col-action {
    width: 100px;
}

input {
    width: calc(100% - 10px);
    height: 24px;
    border: 1px solid #999;
    box-sizing: border-box;
    margin: 2px;
    padding: 2px 4px;
}

td:last-child {
        text-align: center;
        }

.shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.shop-name {
    font-weight: bold;
}

.search-hit {
    background-color: yellow !important;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);

    display: flex;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 20px;
    border-radius: 8px;
    min-width: 300px;
    text-align: center;
}

    </style>
</head>
<body onload="load()">
    <h1>Savannah</h1>
    &emsp;
    <a href="https://keruto-kelt.github.io/urban-disco/index.html">ホームへ戻る</a>
    <br />
    <h2>
        価格比較表(目黒区)
    </h2>
    
    <button type="button" onclick="searchItem()">
    商品検索
    </button>
    &emsp;
    <button type="button" onclick="saveTable(true)">
        保存
    </button>
    &emsp;
    <button type="button" onclick="createShop()">
        店舗追加
    </button>
    <div id="searchPopup" class="popup" style="display:none;">
    <div class="popup-content">

        <h3>検索結果</h3>

        <p id="searchInfo"></p>

        <button onclick="prevSearchResult()">
            前へ
        </button>

        <button onclick="nextSearchResult()">
            次へ
        </button>

        <button onclick="closeSearchPopup()">
            閉じる
        </button>

    </div>
</div>
    <br>
    <br>
    <div id="tableContainer"></div>
    <br>
    <br>
</body>
</html>
